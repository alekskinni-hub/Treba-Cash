name: Update MFO offers from PDL-Profit API

on:
  schedule:
    # Щодня о 06:00 UTC (09:00 за Києвом)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Дозволяє запустити вручну з вкладки Actions на GitHub

permissions:
  contents: write

jobs:
  update-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch offers from PDL-Profit API
        env:
          PDL_API_KEY: ${{ secrets.PDL_API_KEY }}
        run: python fetch_offers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mfo-live-data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update MFO offers data ($(date -u +%Y-%m-%d))"
          git push
